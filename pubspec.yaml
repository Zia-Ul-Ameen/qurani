name: quran_app
description: A production-ready Quran mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  # Navigation
  go_router: ^14.6.3

  # HTTP
  dio: ^5.8.0+1

  # Local persistence
  hive_flutter: ^1.1.0

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15

  # Notifications (Ramadan mode)
  flutter_local_notifications: ^18.0.1

  # File / Storage
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.1.3
  visibility_detector: ^0.4.0+2
  shimmer: ^3.0.0
  collection: ^1.19.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: KFGQPCUthmanTaha
      fonts:
        - asset: assets/fonts/KFGQPCUthmanTahaNaskh.ttf
          weight: 400
